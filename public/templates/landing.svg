  <rect x="32" y="470" width="160" height="6" rx="2" fill="#9ca3af" opacity="0.4"/>

  <rect x="268" y="404" width="236" height="84" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <rect x="280" y="416" width="36" height="36" rx="8" fill="rgba(124,58,237,0.2)"/>
  <text x="290" y="440" font-family="system-ui" font-size="18" fill="#7c3aed">🔒</text>
  <rect x="324" y="420" width="80" height="8" rx="2" fill="#f9fafb"/>
  <rect x="280" y="458" width="200" height="6" rx="2" fill="#9ca3af" opacity="0.6"/>
  <rect x="280" y="470" width="160" height="6" rx="2" fill="#9ca3af" opacity="0.4"/>

  <rect x="516" y="404" width="264" height="84" rx="8" fill="#1f2937" stroke="#7c3aed" stroke-width="1"/>
  <rect x="528" y="416" width="36" height="36" rx="8" fill="rgba(124,58,237,0.2)"/>
  <text x="538" y="440" font-family="system-ui" font-size="18" fill="#7c3aed">📊</text>
  <rect x="572" y="420" width="80" height="8" rx="2" fill="#f9fafb"/>
  <rect x="528" y="458" width="220" height="6" rx="2" fill="#9ca3af" opacity="0.6"/>
  <rect x="528" y="470" width="180" height="6" rx="2" fill="#9ca3af" opacity="0.4"/>

  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
