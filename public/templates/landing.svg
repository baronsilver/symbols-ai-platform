  <rect x="250" y="342" width="50" height="8" rx="2" fill="#9ca3af"/>
  <rect x="440" y="322" width="50" height="14" rx="3" fill="#f9fafb"/>
  <rect x="450" y="342" width="30" height="8" rx="2" fill="#9ca3af"/>
  <rect x="630" y="322" width="60" height="14" rx="3" fill="#f9fafb"/>
  <rect x="640" y="342" width="40" height="8" rx="2" fill="#9ca3af"/>

