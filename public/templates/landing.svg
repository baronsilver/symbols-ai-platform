  <line x1="0" y1="368" x2="800" y2="368" stroke="#1f2937" stroke-width="1"/>
  <!-- 4 stats -->
  <rect x="60" y="322" width="60" height="14" rx="3" fill="#f9fafb"/>
  <rect x="70" y="342" width="40" height="8" rx="2" fill="#9ca3af"/>
